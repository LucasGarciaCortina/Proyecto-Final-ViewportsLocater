<div class="login-container">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-logo-icon">📍</span>
      <h1>VIEWPORTS LOCATER</h1>
      <p>Descubre los mejores miradores</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          class="form-input"
          [class.is-invalid]="email() && !isValidEmail(email())"
          type="email"
          [(ngModel)]="email"
          [ngModelOptions]="{updateOn: 'change'}"
          name="email"
          required
        />
        @if (email() && !isValidEmail(email())) {
          <span class="error-hint">El email no es válido</span>
        }
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          [ngModelOptions]="{updateOn: 'change'}"
          name="password"
          required
        />
      </div>

      @if (error()) {
        <div class="error">
          {{ error() }}
        </div>
      }

      <button
        class="btn-submit"
        type="submit"
        [disabled]="loading() || !isFormValid()"
      >
        {{ loading() ? 'Entrando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <div class="login-footer">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </div>
  </div>
</div>
