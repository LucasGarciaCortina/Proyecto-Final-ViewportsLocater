<nav class="navbar">
  <a routerLink="/" class="navbar-logo">
    <img src="assets/SinFondo.png" alt="Viewports Locater" class="logo-img" />
  </a>

  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Inicio
    </a>

    @if (auth.isLoggedIn()) {
      @if (!esHome) {
      <a routerLink="/crear-mirador" routerLinkActive="active">
        + Crear Mirador
      </a>
      }

      @if (auth.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active">
          Panel Admin
        </a>
      }

      <!-- ✅ DROPDOWN DE USUARIO -->
      <div class="user-menu">
        <button
          class="user-avatar-btn"
          (click)="toggleDropdown()"
          [title]="auth.user()?.name"
        >
          <img
            [src]="userAvatar"
            [alt]="auth.user()?.name"
            class="avatar-img"
          />
        </button>

        @if (dropdownOpen()) {
          <div class="dropdown-menu">
            <div class="dropdown-header">
              <img [src]="userAvatar" [alt]="auth.user()?.name" class="avatar-small" />
              <div>
                <p class="user-name">{{ auth.user()?.name }}</p>
                <p class="user-email">{{ auth.user()?.email }}</p>
              </div>
            </div>

            <div class="dropdown-divider"></div>

            <a
              routerLink="/perfil"
              class="dropdown-item"
              (click)="closeDropdown()"
            >
              👤 Mi Perfil
            </a>

            <a
              routerLink="/favoritos"
              class="dropdown-item"
              (click)="closeDropdown()"
            >
              ❤️ Mis Favoritos
            </a>

            <div class="dropdown-divider"></div>

            <button
              class="dropdown-item logout"
              (click)="logout()"
            >
              🚪 Cerrar Sesión
            </button>
          </div>
        }
      </div>

    } @else {
      <a routerLink="/login" routerLinkActive="active">
        Iniciar sesión
      </a>
      <a routerLink="/register" routerLinkActive="active">
        Registrarse
      </a>
    }
  </div>
</nav>
