<div class="page">
  <div class="header">
    <h1>Mis Favoritos</h1>
    <p>Miradores que marcaste como favoritos</p>
  </div>

  @if (cargando()) {
    <div class="state">Cargando...</div>
  } @else if (error()) {
    <div class="state error">{{ error() }}</div>
  } @else if (favoritos().length === 0) {
    <div class="state">
      <p>Aún no tienes miradores favoritos.</p>
      <a routerLink="/home" class="btn">Explorar miradores</a>
    </div>
  } @else {
    <div class="cards">
      @for (m of favoritos(); track m.id) {
        <app-item-mirador [mirador]="m"></app-item-mirador>
      }
    </div>
  }
</div>
